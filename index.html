<style>
  /* ------------------------------------------------------------
     Keihan Design System — Colors & Type (v5 · SHADCN)

     ------------------------------------------------------------ */
  :root {
    /* shadcn semantic tokens — zinc, light */
    --background:            #FFFFFF;
    --foreground:            #09090B;
    --card:                  #FFFFFF;
    --primary:               #18181B;
    --primary-foreground:    #FAFAFA;
    --muted:                 #F4F4F5;
    --muted-foreground:      #71717A;
    --destructive:           #DC2626;
    --border:                #E4E4E7;
    --logo-filter:           none;

    /* Zinc ramp */
    --zinc-50:  #FAFAFA; --zinc-100: #F4F4F5; --zinc-200: #E4E4E7; --zinc-300: #D4D4D8;
    --zinc-400: #A1A1AA; --zinc-500: #71717A; --zinc-600: #52525B; --zinc-700: #3F3F46;
    --zinc-800: #27272A; --zinc-900: #18181B; --zinc-950: #09090B;

    /* Legacy --keihan-* aliases, remapped onto zinc */
    --keihan-fg-1:       var(--foreground);
    --keihan-fg-2:       var(--zinc-700);
    --keihan-fg-3:       var(--muted-foreground);
    --keihan-fg-4:       var(--zinc-400);
    --keihan-paper:      var(--card);
    --keihan-bg:         var(--zinc-50);
    --keihan-line:       var(--border);
    --keihan-line-soft:  var(--zinc-100);
    --keihan-navy:       var(--primary);
    --keihan-navy-50:    var(--zinc-100);
    --keihan-navy-200:   var(--zinc-400);
    --keihan-blue:       #2563EB;

    --font-display: "Geist", "Noto Sans JP", "Noto Sans SC", -apple-system, sans-serif;
    --font-sans:    "Geist", "Noto Sans JP", "Noto Sans SC", -apple-system, "Segoe UI", sans-serif;
    --font-mono:    "Geist Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;

    --shadow-deck: 0 10px 15px -3px rgba(0,0,0,0.1), 0 4px 6px -4px rgba(0,0,0,0.1);
    --ease-out: cubic-bezier(0.2, 0.7, 0.3, 1);
  }

  /* Dark theme — zinc dark */
  [data-theme="dark"] {
    --background: #09090B; --foreground: #FAFAFA;
    --card: #18181B;
    --primary: #FAFAFA; --primary-foreground: #18181B;
    --muted: #27272A; --muted-foreground: #A1A1AA;
    --destructive: #EF4444;
    --border: #27272A;
    --logo-filter: brightness(0) invert(0.98);
    --keihan-fg-1: #FAFAFA; --keihan-fg-2: #D4D4D8; --keihan-fg-3: #A1A1AA; --keihan-fg-4: #52525B;

    --keihan-line: #27272A; --keihan-line-soft: #1F1F23;
    --keihan-navy: #FAFAFA;
    --keihan-navy-50: #27272A; --keihan-navy-200: #71717A;
    --keihan-blue: #60A5FA;

  * { box-sizing: border-box; }
  html, body {
    font-family: var(--font-sans);

  .kx-form { flex: 1 1 520px; min-width: 0; display: flex; flex-direction: column; gap: 20px; }

  .kx-mbar { display: none; }
  .kx-wrap { padding: 24px 24px 64px; }
  .kx-hero { padding: 44px 24px 40px; }
  .kx-tabs { padding: 24px 24px 0; }
  .kx-sec { padding: 24px; }
  .kx-scard { padding: 26px 26px 24px; }

<div style="min-height: 100vh; background: var(--keihan-bg); font-family: var(--font-sans); color: var(--keihan-fg-1);">

    <div class="kx-hero" style="max-width: 1160px; margin: 0 auto;">

    </div>
    <span id="m-badge"></span>
  </div>
</div>

/* ============================================================
   高度人才评分系统 — Japan HSP points calculator

// ---------- state ----------
const state = {
  lang: 'zh',

  theme: (function () {
    try { return localStorage.getItem('kx-theme') === 'dark' ? 'dark' : 'light'; } catch (e) { return 'light'; }
  })(),
};

function applyTheme(th) {
  document.documentElement.setAttribute('data-theme', th === 'dark' ? 'dark' : '');
  const meta = document.querySelector('meta[name="theme-color"]');
  if (meta) meta.content = th === 'dark' ? '#09090B' : '#FFFFFF';
}

function toggleTheme() {
  const th = state.theme === 'dark' ? 'light' : 'dark';
  try { localStorage.setItem('kx-theme', th); } catch (e) {}
  state.theme = th;
  applyTheme(th);
  render();
}

      { id: 'shikaku2', kind: 'radio', key: 'shikaku', pts: { a: null, b: 10, c: null }, label: { zh: '持有 2 项及以上职务相关的日本国家资格', tw: '持有 2 項及以上職務相關的日本國家資格', ja: '職務に関連する日本の国家資格を2つ以上保有', ko: '직무 관련 일본 국가자격 2개 이상 보유', en: '2+ job-related Japanese national qualifications' } },
      { id: 'foreignQual', kind: 'check', pts: { a: null, b: 5, c: null }, label: { zh: '持有职务相关的外国资格等', tw: '持有職務相關的外國資格等', ja: '職務に関連する外国の資格等を保有', ko: '직무 관련 외국 자격 등 보유', en: 'Holds a job-related foreign qualification' } },

      { id: 'fund', kind: 'check', pts: { a: null, b: 10, c: 10 }, label: { zh: '从事投资运用业等相关业务', tw: '從事投資運用業等相關業務', ja: '投資運用業等に係る業務に従事', ko: '투자운용업 등 관련 업무에 종사', en: 'Engaged in investment-management business' } },

const INCOME_MATRIX = {
  i1000: { u30: 40, u35: 40, u40: 40, o40: 40 },
  i900:  { u30: 35, u35: 35, u40: 35, o40: 35 },
  i800:  { u30: 30, u35: 30, u40: 30, o40: 30 },
  i700:  { u30: 25, u35: 25, u40: 25, o40: 0 },
  i600:  { u30: 20, u35: 20, u40: 20, o40: 0 },
  i500:  { u30: 15, u35: 15, u40: 0,  o40: 0 },
  i400:  { u30: 10, u35: 0,  u40: 0,  o40: 0 },
};

const HTML_LANG = { zh: 'zh-CN', tw: 'zh-TW', ja: 'ja', ko: 'ko', en: 'en' };

const SUN_SVG = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="4"></circle><path d="M12 2v2"></path><path d="M12 20v2"></path><path d="m4.93 4.93 1.41 1.41"></path><path d="m17.66 17.66 1.41 1.41"></path><path d="M2 12h2"></path><path d="M20 12h2"></path><path d="m6.34 17.66-1.41 1.41"></path><path d="m19.07 4.93-1.41 1.41"></path></svg>';
const MOON_SVG = '<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 3a6 6 0 0 0 9 9 9 9 0 1 1-9-9Z"></path></svg>';

// ---------- helpers ----------
function tx(obj) { const l = state.lang; return (obj && (obj[l] ?? obj.zh)) || ''; }

function setSel(mut) {
  const cur = { ...(state.sel[state.cat] || {}) };
  mut(cur);
  state.sel[state.cat] = cur;
  render();
}

function toggleCheck(id) { setSel((cur) => { cur[id] = !cur[id]; }); }
function pickRadio(key, id) { setSel((cur) => { cur[key] = cur[key] === id ? null : id; }); }

function ageKey(sel) { return sel.age || 'o40'; }

function incomePts(cat, sel) {
  const inc = sel.income;
  if (!inc) return 0;
  if (cat === 'c') return ({ c3000: 50, c2500: 40, c2000: 30, c1500: 20, c1000: 10 })[inc] || 0;
  const row = INCOME_MATRIX[inc];
  return row ? row[ageKey(sel)] : 0;
}

function researchPts(cat, sel) {
  const n = ['patent', 'grant', 'paper', 'rother'].filter((k) => sel[k]).length;
  if (cat === 'a') return n >= 2 ? 25 : n === 1 ? 20 : 0;
  if (cat === 'b') return n >= 1 ? 15 : 0;
  return 0;
}

function compute() {
  const cat = state.cat;
  const sel = state.sel[cat] || {};
  const warnings = [];
  let total = 0;

  const eduPts = { phd: { a: 30, b: 30, c: 20 }, master: { a: 20, b: 20, c: 20 }, bachelor: { a: 10, b: 10, c: 10 } };
  if (sel.edu) total += (eduPts[sel.edu] || {})[cat] || 0;
  if (sel.multiDeg) total += 5;
  if (cat === 'c' && sel.mba) total += 5;

  const careerPts = { y10: { b: 20, c: 25 }, y7: { a: 15, b: 15, c: 20 }, y5: { a: 10, b: 10, c: 15 }, y3: { a: 5, b: 5, c: 10 } };
  if (sel.career) total += (careerPts[sel.career] || {})[cat] || 0;

  if (cat !== 'c' && sel.age) total += ({ u30: 15, u35: 10, u40: 5, o40: 0 })[sel.age] || 0;

  total += incomePts(cat, sel);
  total += researchPts(cat, sel);

  if (cat === 'c' && sel.pos) total += ({ daihyo: 10, yakuin: 5 })[sel.pos] || 0;

  if (sel.jp === 'n1') total += 15;
  else if (sel.jp === 'n2') {
    if (sel.jpUniv) warnings.push(tx(UI.n2warn));
    else total += 10;
  }

  if (sel.jpUniv) total += 10;
  if (sel.univ) total += 10;
  if (sel.inno) total += 10;
  if (sel.sme) { if (sel.inno) total += 10; else warnings.push(tx(UI.smeWarn)); }
  if (sel.rnd) total += 5;
  if (sel.growth) total += 10;
  if (sel.localGov) total += 10;
  if (sel.jica) total += 5;
  if (cat === 'b' && sel.shikaku) total += sel.shikaku === 'shikaku2' ? 10 : 5;
  if (cat === 'b' && sel.foreignQual) total += 5;
  if (cat === 'c' && sel.invest) total += 5;
  if ((cat === 'b' || cat === 'c') && sel.fund) total += 10;

  return { total, warnings, sel, cat };
}

function sec(id) { return SECTIONS.find((s) => s.id === id); }

function suggestions(cat, sel, total) {
  const out = [];
  const push = (pts, label) => { if (pts > 0) out.push({ pts: '+' + pts, n: pts, label }); };
  // Japanese upgrade
  if (sel.jp !== 'n1') push(sel.jp === 'n2' && !sel.jpUniv ? 5 : 15, tx(sec('jp').items[0].label));
  // education upgrade to doctorate / master
  const eduTop = cat === 'c' ? 20 : 30;
  const eduCur = sel.edu ? ({ phd: eduTop, master: 20, bachelor: 10 })[sel.edu] : 0;
  if (eduCur < eduTop) push(eduTop - eduCur, tx({ zh: '取得更高学位（博士/硕士）', tw: '取得更高學位（博士/碩士）', ja: 'より高い学位の取得（博士・修士）', ko: '더 높은 학위 취득(박사/석사)', en: 'Earn a higher degree (PhD / Master’s)' }));
  // position (c)
  if (cat === 'c' && sel.pos !== 'daihyo') push(sel.pos === 'yakuin' ? 5 : 10, tx(sec('pos').items[0].label));
  // research (a/b)
  if (cat !== 'c') {
    const n = ['patent', 'grant', 'paper', 'rother'].filter((k) => sel[k]).length;
    const next = cat === 'a' ? (n === 0 ? 20 : n === 1 ? 5 : 0) : (n === 0 ? 15 : 0);
    if (next) push(next, tx({ zh: '补充一项研究实绩（专利/论文等）', tw: '補充一項研究實績（專利/論文等）', ja: '研究実績を1つ追加（特許・論文等）', ko: '연구 실적 1개 추가(특허/논문 등)', en: 'Add one research achievement (patent / papers)' }));
  }
  // unchecked bonus checks
  const bonus = sec('bonus').items;
  for (const it of bonus) {
    if (it.kind !== 'check') continue;
    const p = it.pts[cat];
    if (p == null || p === 0) continue;
    if (sel[it.id]) continue;
    if (it.id === 'sme' && !sel.inno) continue;
    push(p, tx(it.label));
  }
  if (cat === 'b' && sel.shikaku !== 'shikaku2') push(sel.shikaku === 'shikaku1' ? 5 : 10, tx({ zh: '考取职务相关的日本国家资格', tw: '考取職務相關的日本國家資格', ja: '職務関連の国家資格を取得', ko: '직무 관련 일본 국가자격 취득', en: 'Obtain job-related national qualifications' }));
  if (!sel.univ) push(10, tx({ zh: '确认母校是否属于指定大学（世界前 300 / SGU / Innovative Asia）', tw: '確認母校是否屬於指定大學（世界前 300 / SGU / Innovative Asia）', ja: '出身校が告示大学（世界300位以内・SGU・イノベーティブアジア）か確認', ko: '출신교가 지정 대학(세계 300위 / SGU / Innovative Asia)인지 확인', en: 'Check if your alma mater is a designated university (top-300 / SGU / Innovative Asia)' }));
  out.sort((x, y) => y.n - x.n);
  return out.slice(0, 5);
}

// ---------- render ----------
const esc = (s) => String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
const $ = (id) => document.getElementById(id);

function render() {
  const lang = state.lang, cat = state.cat;
  const t = {};
  for (const k of Object.keys(UI)) {
    const v = UI[k];
    t[k] = typeof v[lang] === 'function' ? v[lang] : tx(v);
  }

  const { total, warnings, sel } = compute();

  document.documentElement.lang = HTML_LANG[lang] || 'zh-CN';
  document.title = t.title + ' | KEIHAN';

  // header / hero / static texts
  $('brand-sub').textContent = t.brandSub;
  $('hero-title').textContent = t.title;
  $('hero-sub').textContent = t.subtitle;
  $('disclaimer').textContent = t.disclaimer;
  $('score-label').textContent = t.scoreLabel;
  $('unit').textContent = t.unit;
  $('m-unit').textContent = t.unit;

  // language buttons + theme toggle
  const LANGS = [['zh', '简体'], ['tw', '繁體'], ['ja', '日本語'], ['ko', '한국어'], ['en', 'EN']];
  $('langs').innerHTML = LANGS.map(([id, label]) => {
    const on = id === lang;
    return `<button type="button" data-lang="${id}" aria-pressed="${on}" style="font-family: var(--font-sans); font-size: 12.5px; font-weight: 500; letter-spacing: 0.02em; padding: 7px 12px; border-radius: 8px; cursor: pointer; border: 1px solid ${on ? 'var(--primary)' : 'var(--keihan-line)'}; background: ${on ? 'var(--primary)' : 'var(--keihan-paper)'}; color: ${on ? 'var(--primary-foreground)' : 'var(--keihan-fg-2)'}; transition: all 200ms var(--ease-out);">${label}</button>`;
  }).join('') +
    `<button type="button" data-action="theme" title="Light / Dark" style="width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; padding: 0; border-radius: 8px; cursor: pointer; border: 1px solid var(--keihan-line); background: var(--keihan-paper); color: var(--keihan-fg-2); transition: all 200ms var(--ease-out);">${state.theme === 'dark' ? SUN_SVG : MOON_SVG}</button>`;

  // category tabs
  $('cats').innerHTML = CATS.map((c) => {
    const on = c.id === cat;
    return `<button type="button" data-cat="${c.id}" aria-pressed="${on}" style="text-align: left; cursor: pointer; border-radius: 12px; padding: 18px 20px; border: 1px solid ${on ? 'var(--primary)' : 'var(--keihan-line)'}; background: ${on ? 'var(--primary)' : 'var(--keihan-paper)'}; color: ${on ? 'var(--primary-foreground)' : 'var(--keihan-fg-1)'}; box-shadow: ${on ? 'var(--shadow-deck)' : 'none'}; transition: all 200ms var(--ease-out); font-family: var(--font-sans);">` +
      `<span style="font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.1em; padding: 3px 8px; border-radius: 4px; background: ${on ? 'color-mix(in srgb, var(--primary-foreground) 14%, transparent)' : 'var(--muted)'}; color: ${on ? 'var(--primary-foreground)' : 'var(--foreground)'};">${c.badge}</span>` +
      `<span style="display: block; margin-top: 10px; font-size: 17px; font-weight: 600; letter-spacing: -0.01em;">${esc(tx(c.name))}</span>` +
      `<span style="display: block; margin-top: 4px; font-size: 11.5px; letter-spacing: 0.04em; color: ${on ? 'color-mix(in srgb, var(--primary-foreground) 72%, transparent)' : 'var(--keihan-fg-3)'};">${esc(c.ja)}</span>` +
      `</button>`;
  }).join('');

  // sections
  const sectionsHtml = [];
  for (const S of SECTIONS) {
    if (!S.cats.includes(cat)) continue;
    let items = S.items;
    let note = S.note ? tx(S.note) : null;
    if (S.id === 'income') { items = cat === 'c' ? S.itemsC : S.itemsAB; note = tx(cat === 'c' ? S.noteC : S.noteAB); }
    if (S.id === 'research') note = tx(cat === 'a' ? S.noteA : S.noteB);

    const rows = [];
    let hasRadio = false, hasCheck = false;
    for (const it of items) {
      let pts;
      if (S.id === 'income' && cat !== 'c') {
        pts = INCOME_MATRIX[it.id][ageKey(sel)];
      } else if (S.id === 'research') {
        pts = null; // shown as check without fixed pts
      } else {
        pts = it.pts ? it.pts[cat] : null;
        if (pts === null || pts === undefined) continue;
      }
      const isRadio = it.kind === 'radio';
      if (isRadio) hasRadio = true; else hasCheck = true;
      const asRadioLook = isRadio; // 指示器形状跟随交互语义：单选=圆形，多选=方形
      const on = isRadio ? sel[it.key] === it.id : !!sel[it.id];
      const dim = pts === 0 && S.id === 'income';
      const ptsText = S.id === 'research' ? '' : (pts === 0 ? '+0' : '+' + pts);
      rows.push(
        `<div role="${isRadio ? 'radio' : 'checkbox'}" aria-checked="${on}" tabindex="0" data-kind="${it.kind}"${isRadio ? ` data-key="${it.key}"` : ''} data-id="${it.id}" style="display: flex; align-items: center; justify-content: space-between; gap: 14px; padding: 11px 14px; border-radius: 8px; cursor: pointer; user-select: none; border: 1px solid ${on ? 'var(--primary)' : 'var(--keihan-line)'}; background: ${on ? 'var(--primary)' : 'var(--keihan-paper)'}; color: ${on ? 'var(--primary-foreground)' : (dim ? 'var(--keihan-fg-4)' : 'var(--keihan-fg-1)')}; transition: background 120ms var(--ease-out), border-color 120ms var(--ease-out);">` +
        `<div style="display: flex; align-items: center; gap: 12px; min-width: 0;">` +
        `<span style="flex: none; width: 16px; height: 16px; display: inline-flex; align-items: center; justify-content: center; border-radius: ${asRadioLook ? '50%' : '4px'}; border: 1px solid ${on ? 'var(--primary-foreground)' : 'var(--zinc-400)'}; background: ${on ? 'var(--primary-foreground)' : 'transparent'}; color: var(--primary); font-size: 10px; font-weight: 700; line-height: 1;">${on ? (asRadioLook ? '●' : '✓') : ''}</span>` +
        `<span style="font-size: 14px; line-height: 1.45;">${esc(tx(it.label))}</span>` +
        `</div>` +
        `<span style="flex: none; font-family: var(--font-mono); font-size: 13px; font-weight: 600; color: ${on ? 'color-mix(in srgb, var(--primary-foreground) 78%, transparent)' : (dim ? 'var(--keihan-fg-4)' : 'var(--foreground)')};">${ptsText}</span>` +
        `</div>`
      );
    }
    if (!rows.length) continue;
    const mode = hasRadio && !hasCheck ? t.single : (!hasRadio ? t.multi : t.single + ' + ' + t.multi);
    sectionsHtml.push(
      `<section class="kx-sec" style="background: var(--keihan-paper); border: 1px solid var(--keihan-line); border-radius: 12px;">` +
      `<div style="display: flex; align-items: baseline; justify-content: space-between; gap: 12px;">` +
      `<h4 style="font-size: 16px; font-weight: 600; letter-spacing: -0.015em; margin: 0;">${esc(tx(S.title))}</h4>` +
      `<span style="font-family: var(--font-mono); font-size: 11px; color: var(--keihan-fg-3); letter-spacing: 0.04em; white-space: nowrap;">${esc(mode)}</span>` +
      `</div>` +
      (note ? `<p style="margin: 6px 0 0; font-size: 12.5px; line-height: 1.6; color: var(--keihan-fg-3);">${esc(note)}</p>` : '') +
      `<div style="display: flex; flex-direction: column; gap: 8px; margin-top: 16px;">${rows.join('')}</div>` +
      `</section>`
    );
  }
  $('sections').innerHTML = sectionsHtml.join('');

  // score panel
  const pct = Math.min(100, total);
  $('score').textContent = String(total);
  const fill = $('fill');
  fill.style.width = pct + '%';
  fill.style.background = total >= 70 ? 'var(--primary)' : 'var(--keihan-navy-200)';

  $('statuses').innerHTML = [
    { pts: '70', name: t.t70, met: total >= 70 },
    { pts: '80', name: t.t80, met: total >= 80 },
  ].map((s) =>
    `<div style="display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid var(--border); border-radius: 8px; padding: 10px 12px;">` +
    `<div style="display: flex; align-items: baseline; gap: 10px;">` +
    `<span style="font-family: var(--font-mono); font-size: 13px; font-weight: 600; font-feature-settings: 'tnum' 1; color: var(--foreground);">${s.pts}</span>` +
    `<span style="font-size: 13px; font-weight: 500;">${esc(s.name)}</span>` +
    `</div>` +
    `<span style="font-size: 11px; font-weight: 600; letter-spacing: 0.06em; padding: 3px 9px; border-radius: 999px; background: ${s.met ? 'var(--primary)' : 'var(--keihan-bg)'}; color: ${s.met ? 'var(--primary-foreground)' : 'var(--keihan-fg-3)'}; border: 1px solid ${s.met ? 'var(--primary)' : 'var(--keihan-line)'};">${esc(s.met ? t.met : t.notMet)}</span>` +
    `</div>`
  ).join('');

  const resultTitle = total >= 80 ? t.result80 : total >= 70 ? t.result70 : t.resultBelow;
  $('result-title').textContent = resultTitle;
  $('benefits').innerHTML = (BENEFITS[lang] || BENEFITS.zh).map((x) =>
    `<div style="display: flex; gap: 8px; font-size: 12.5px; line-height: 1.55; color: var(--keihan-fg-1);">` +
    `<span style="color: var(--muted-foreground);">—</span>` +
    `<span>${esc(x)}</span>` +
    `</div>`
  ).join('');

  $('warnings-slot').innerHTML = warnings.length
    ? `<div style="margin-top: 12px; background: var(--background); border: 1px solid var(--destructive); border-radius: 8px; padding: 12px 14px; display: flex; flex-direction: column; gap: 6px;">` +
      warnings.map((w) => `<div style="font-size: 12.5px; line-height: 1.55; color: var(--destructive);">${esc(w)}</div>`).join('') +
      `</div>`
    : '';

  // suggestions
  const gap70 = 70 - total, gap80 = 80 - total;
  const showSugg = total < 80;
  const gapText = total < 70 ? t.gap70(gap70) : t.gap80(gap80);
  $('sugg-slot').innerHTML = showSugg
    ? `<div style="margin-top: 16px; background: var(--keihan-paper); border: 1px solid var(--keihan-line); border-radius: 12px; padding: 20px 22px;">` +
      `<div style="font-size: 12px; font-weight: 500; letter-spacing: 0.02em; color: var(--muted-foreground);">${esc(t.suggTitle)}</div>` +
      `<div style="margin-top: 8px; font-size: 13.5px; font-weight: 600; color: var(--keihan-navy);">${esc(gapText)}</div>` +
      `<div style="display: flex; flex-direction: column; gap: 8px; margin-top: 12px;">` +
      suggestions(cat, sel, total).map((sg) =>
        `<div style="display: flex; align-items: baseline; gap: 12px; border-top: 1px solid var(--keihan-line-soft); padding-top: 8px;">` +
        `<span style="font-family: var(--font-mono); font-size: 13px; font-weight: 600; font-feature-settings: 'tnum' 1; color: var(--keihan-blue); white-space: nowrap;">${sg.pts}</span>` +
        `<span style="font-size: 12.5px; line-height: 1.5; color: var(--keihan-fg-2);">${esc(sg.label)}</span>` +
        `</div>`
      ).join('') +
      `</div></div>`
    : '';

  // mobile bar
  $('m-score').textContent = String(total);
  const mFill = $('m-fill');
  mFill.style.width = pct + '%';
  mFill.style.background = total >= 70 ? '#FFFFFF' : 'var(--zinc-300)';
  $('m-text').textContent = total < 70 ? gapText : resultTitle;
  const mBadge = $('m-badge');
  mBadge.textContent = total >= 70 ? '70+' : String(total) + ' / 70';
  mBadge.style.cssText = `flex: none; font-family: var(--font-mono); font-size: 11px; font-weight: 600; letter-spacing: 0.04em; padding: 5px 10px; border-radius: 999px; background: ${total >= 70 ? '#FFFFFF' : 'rgba(255,255,255,0.12)'}; color: ${total >= 70 ? '#18181B' : 'var(--zinc-300)'}; border: 1px solid ${total >= 70 ? '#FFFFFF' : 'rgba(255,255,255,0.25)'};`;
}

// ---------- events ----------
function activate(el) {
  const themeBtn = el.closest('[data-action="theme"]');
  if (themeBtn) { toggleTheme(); return; }
  const langBtn = el.closest('[data-lang]');
  if (langBtn) { state.lang = langBtn.dataset.lang; render(); return; }
  const catBtn = el.closest('[data-cat]');
  if (catBtn) { state.cat = catBtn.dataset.cat; render(); return; }
  const row = el.closest('[data-kind]');
  if (row) {
    if (row.dataset.kind === 'radio') pickRadio(row.dataset.key, row.dataset.id);
    else toggleCheck(row.dataset.id);
  }
}

document.addEventListener('click', (e) => activate(e.target));
document.addEventListener('keydown', (e) => {
  if ((e.key === 'Enter' || e.key === ' ') && e.target.matches('[data-kind]')) {
    e.preventDefault();
    activate(e.target);
  }
});

applyTheme(state.theme);
render();
</script>
</body>
</html>
