  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  <script type="__bundler/template">
"<!DOCTYPE html>\n<html><head>\n<meta charset=\"utf-8\">\n<meta name=\"viewport\" content=\"width=device-width, initial-scale=1\">\n<script src=\"1f74b9de-37d3-4465-9e68-59a276611d1e\"><\u002Fscript>\n<\u002Fhead>\n<body>\n<x-dc>\n<helmet>\n  <style>/* ============================================================\n   Keihan Design System — Colors & Type\n   京阪住業株式会社 KEIHAN\n   ============================================================ */\n\n/* ------------------------------------------------------------\n   Webfonts\n   Brand: Roboto (variable, wdth + wght axes) — local TTFs in /fonts.\n          Used for both body and display. Roboto's geometric construction\n          and uniform stroke pair cleanly with the kanji 京阪住業 lockup.\n   JP/CN: Noto Sans JP / SC fallbacks for kanji + simplified Chinese.\n   Mono:  JetBrains Mono for tabular data (yields, prices).\n   ------------------------------------------------------------ */\n@font-face {\n  font-family: \"Roboto\";\n  src: url(\"ce2d471b-0870-4a3e-be0a-d42190395b5e\") format(\"truetype-variations\");\n  font-weight: 100 900;\n  font-stretch: 75% 125%;\n  font-style: normal;\n  font-display: swap;\n}\n\n\n\n:root {\n  /* ============================================================\n     COLOR TOKENS — Foundation\n     ============================================================ */\n\n  /* Neutral — the backbone of the brand. Cool greys, not warm. */\n  --keihan-ink:        #0A0A0A;   /* near-black, primary text & logo */\n  --keihan-ink-soft:   #1F1F1F;\n  --keihan-fg-1:       #0A0A0A;   /* primary text */\n  --keihan-fg-2:       #4A4A4A;   /* secondary text */\n  --keihan-fg-3:       #8A8A8A;   /* tertiary / labels */\n  --keihan-fg-4:       #B8B8B8;   /* disabled / muted */\n\n  --keihan-paper:      #FFFFFF;   /* cards, modals */\n  --keihan-bg:         #F3F4F6;   /* page background — brand mist (was #F4F4F4) */\n  --keihan-bg-warm:    #EFEFEF;   /* alt page background */\n  --keihan-bg-soft:    #FAFAFA;   /* very light surface */\n  --keihan-line:       #E5E5E5;   /* default borders */\n  --keihan-line-soft:  #EFEFEF;   /* subtle dividers */\n  --keihan-line-strong:#112035;   /* hard accent lines — brand navy */\n\n  /* ------------------------------------------------------------\n     Brand primary — Deep navy from the brand application spec.\n     This is the LOGO color (the hexagonal mark + 京阪住业 + KEIHAN\n     wordmark are all set in #112035) and the system primary.\n     Royal blue stays available as a secondary \"data\" accent for\n     the Keynote layouts that already used it.\n     ------------------------------------------------------------ */\n  --keihan-navy:       #112035;   /* PRIMARY brand color — logo, headlines, key UI */\n  --keihan-navy-deep:  #0A1626;   /* hover / press, deep surfaces */\n  --keihan-navy-soft:  #1A2D45;   /* alt navy for body-on-navy hierarchy */\n  --keihan-navy-50:    #EEF0F4;   /* tint backgrounds */\n  --keihan-navy-100:   #D6DCE5;\n  --keihan-navy-200:   #A8B3C2;\n\n  /* Silver — the brand's only \"shine\" cue. Used for hairlines,\n     dividers, low-contrast info on dark navy, and to evoke the\n     foil-stamp effect on printed collateral. Never as a fill. */\n  --keihan-silver:     #C9CED6;\n  --keihan-silver-soft:#DCDFE5;\n  --keihan-silver-deep:#9EA5B0;\n\n  /* Mist — the brand's off-white. Used for app-icon backgrounds,\n     light surfaces, and digital paper. Slightly cooler than #F4F4F4. */\n  --keihan-mist:       #F3F4F6;\n\n  /* Secondary data accent — Keynote royal blue. Reserved for\n     charts and the giant numeral treatment in slides. Not a UI primary. */\n  --keihan-blue:       #2D49E8;\n  --keihan-blue-deep:  #1F36C2;\n  --keihan-blue-50:    #EEF1FE;\n  --keihan-blue-100:   #D6DDFC;\n  --keihan-blue-200:   #A8B5F8;\n\n  /* Coral — risk / \"watch out\" callouts only. Used sparingly. */\n  --keihan-coral:      #E94B3C;\n  --keihan-coral-deep: #C73828;\n  --keihan-coral-50:   #FDECEA;\n\n  /* ------------------------------------------------------------\n     Semantic primary aliases — point UI components at --keihan-primary\n     so the brand color can be swapped centrally if needed.\n     ------------------------------------------------------------ */\n  --keihan-primary:        var(--keihan-navy);\n  --keihan-primary-deep:   var(--keihan-navy-deep);\n  --keihan-primary-50:     var(--keihan-navy-50);\n  --keihan-primary-100:    var(--keihan-navy-100);\n  --keihan-primary-200:    var(--keihan-navy-200);\n\n  /* Semantic — calmer real-estate context */\n  --keihan-ok:         #16A34A;\n  --keihan-warn:       #D97706;\n  --keihan-bad:        var(--keihan-coral);\n  --keihan-info:       var(--keihan-navy);\n\n  /* Data viz scale (for yield charts, land-price heatmaps).\n     Lead with brand navy; royal blue is a secondary tone for distinction. */\n  --keihan-data-1:     #112035;   /* brand navy */\n  --keihan-data-2:     #1A2D45;\n  --keihan-data-3:     #4A5C76;\n  --keihan-data-4:     #2D49E8;   /* secondary blue */\n  --keihan-data-5:     #C9CED6;   /* silver */\n  --keihan-data-6:     #E94B3C;   /* risk / coral */\n\n  /* ============================================================\n     TYPOGRAPHY TOKENS\n     ============================================================ */\n\n  --font-display: \"Roboto\", \"Noto Sans JP\", \"Noto Sans SC\", system-ui, sans-serif;\n  --font-sans:    \"Roboto\", \"Noto Sans JP\", \"Noto Sans SC\", -apple-system, BlinkMacSystemFont, \"Segoe UI\", sans-serif;\n  --font-jp:      \"Noto Sans JP\", \"Hiragino Kaku Gothic ProN\", \"Yu Gothic\", sans-serif;\n  --font-cn:      \"Noto Sans SC\", \"PingFang SC\", \"Microsoft YaHei\", sans-serif;\n  --font-mono:    \"JetBrains Mono\", ui-monospace, \"SF Mono\", Menlo, Consolas, monospace;\n\n  /* Type scale — generous, Keynote-derived */\n  --text-display-xl: 88px;   /* hero numerals (e.g. \"200+\" client count) */\n  --text-display-lg: 64px;\n  --text-display-md: 48px;\n  --text-h1:         40px;\n  --text-h2:         32px;\n  --text-h3:         24px;\n  --text-h4:         20px;\n  --text-h5:         18px;\n  --text-body-lg:    18px;\n  --text-body:       16px;\n  --text-body-sm:    14px;\n  --text-label:      13px;\n  --text-caption:    12px;\n  --text-micro:      11px;  /* vertical sidebar marks */\n\n  --leading-tight:   1.1;\n  --leading-snug:    1.25;\n  --leading-normal:  1.5;\n  --leading-relaxed: 1.7;\n\n  --tracking-tight:   -0.02em;\n  --tracking-normal:  0;\n  --tracking-wide:    0.04em;\n  --tracking-wider:   0.12em;   /* sidebar \"KEIHANJUGYO\" */\n  --tracking-widest:  0.2em;\n\n  /* ============================================================\n     SPACING & RADII (used in components below + UI kits)\n     ============================================================ */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  --radius-none: 0;\n  --radius-xs: 2px;\n  --radius-sm: 4px;\n  --radius-md: 6px;       /* default for buttons, inputs */\n  --radius-lg: 10px;      /* cards */\n  --radius-xl: 16px;\n  --radius-pill: 999px;\n\n  --shadow-1: 0 1px 2px rgba(10, 10, 10, 0.04), 0 1px 1px rgba(10, 10, 10, 0.03);\n  --shadow-2: 0 4px 12px rgba(10, 10, 10, 0.06), 0 1px 2px rgba(10, 10, 10, 0.04);\n  --shadow-3: 0 8px 24px rgba(10, 10, 10, 0.08), 0 2px 6px rgba(10, 10, 10, 0.04);\n  --shadow-deck: 0 12px 28px rgba(17, 32, 53, 0.10), 0 4px 8px rgba(17, 32, 53, 0.04); /* Keynote card — navy-tinted */\n  --shadow-inset-line: inset 4px 0 0 var(--keihan-navy); /* callout cards: left brand-navy bar */\n  --shadow-inset-line-blue: inset 4px 0 0 var(--keihan-blue); /* legacy royal-blue bar (slides) */\n\n  --ease-out: cubic-bezier(0.2, 0.7, 0.3, 1); /* @kind other */\n  --ease-in-out: cubic-bezier(0.5, 0, 0.5, 1); /* @kind other */\n  --dur-fast: 120ms; /* @kind other */\n  --dur-base: 200ms; /* @kind other */\n  --dur-slow: 320ms; /* @kind other */\n}\n\n/* ============================================================\n   SEMANTIC ELEMENT STYLES\n   ============================================================ */\n\nhtml, body {\n  font-family: var(--font-sans);\n  color: var(--keihan-fg-1);\n  background: var(--keihan-bg);\n  font-size: var(--text-body);\n  line-height: var(--leading-normal);\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\nh1, .h1 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-h1);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-tight);\n  color: var(--keihan-fg-1);\n  margin: 0;\n}\nh2, .h2 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-h2);\n  line-height: var(--leading-snug);\n  letter-spacing: var(--tracking-tight);\n  margin: 0;\n}\nh3, .h3 {\n  font-family: var(--font-display);\n  font-weight: 500;\n  font-size: var(--text-h3);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\nh4, .h4 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--text-h4);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\nh5, .h5 {\n  font-family: var(--font-sans);\n  font-weight: 600;\n  font-size: var(--text-h5);\n  line-height: var(--leading-snug);\n  margin: 0;\n}\n\np, .body {\n  font-family: var(--font-sans);\n  font-size: var(--text-body);\n  line-height: var(--leading-relaxed);\n  color: var(--keihan-fg-1);\n  margin: 0;\n}\n\n.body-lg { font-size: var(--text-body-lg); line-height: var(--leading-relaxed); }\n.body-sm { font-size: var(--text-body-sm); line-height: var(--leading-normal); color: var(--keihan-fg-2); }\n\n.label, label {\n  font-family: var(--font-sans);\n  font-size: var(--text-label);\n  font-weight: 500;\n  letter-spacing: var(--tracking-wide);\n  color: var(--keihan-fg-2);\n  text-transform: uppercase;\n}\n\n.caption { font-size: var(--text-caption); color: var(--keihan-fg-3); }\n\n.eyebrow {\n  font-family: var(--font-sans);\n  font-size: var(--text-label);\n  font-weight: 500;\n  letter-spacing: var(--tracking-widest);\n  text-transform: uppercase;\n  color: var(--keihan-fg-3);\n}\n\n/* The vertical \"KEIHANJUGYO\" sidebar mark used on every slide */\n.sidebar-mark {\n  font-family: var(--font-sans);\n  font-size: var(--text-micro);\n  font-weight: 600;\n  letter-spacing: var(--tracking-widest);\n  writing-mode: vertical-rl;\n  transform: rotate(180deg);\n  color: var(--keihan-fg-1);\n}\n\n/* Display numeral — the giant \"0\" / \"200+\" / \"8%\" treatment from the deck.\n   Default to brand navy; deck variants can opt into royal blue with .display-numeral--blue */\n.display-numeral {\n  font-family: var(--font-display);\n  font-weight: 800;\n  font-size: var(--text-display-xl);\n  line-height: 0.9;\n  letter-spacing: var(--tracking-tight);\n  color: var(--keihan-navy);\n}\n.display-numeral--blue { color: var(--keihan-blue); }\n\ncode, kbd, pre, samp, .mono {\n  font-family: var(--font-mono);\n  font-feature-settings: \"tnum\" 1, \"zero\" 1;\n}\n\na {\n  color: var(--keihan-navy);\n  text-decoration: none;\n  border-bottom: 1px solid transparent;\n  transition: border-color var(--dur-base) var(--ease-out), opacity var(--dur-base) var(--ease-out);\n}\na:hover { border-bottom-color: var(--keihan-navy); }\na:active { opacity: 0.6; }\n\n::selection { background: var(--keihan-navy); color: var(--keihan-paper); }\n<\u002Fstyle>\n  <script src=\"6202ffb0-a95b-4c80-966a-75d9a0ed1e85\"><\u002Fscript>\n  <style>\n    body { margin: 0; background: #F3F4F6; }\n    a { color: #112035; text-decoration: none; }\n    a:hover { border-bottom: 1px solid #112035; }\n    .kx-main { display: flex; flex-wrap: wrap; gap: 28px; align-items: flex-start; }\n    .kx-form { flex: 1 1 520px; min-width: 0; display: flex; flex-direction: column; gap: 20px; }\n    .kx-side { flex: 1 1 320px; max-width: 380px; position: sticky; le=\"max-width: 1160px; margin: 0 auto;\">\n      <div style=\"font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--keihan-silver);\">HSP POINTS CALCULATOR<\u002Fdiv>\n      <h1 style=\"margin: 12px 0 0; font-family: var(--font-display); font-weight: 700; font-size: clamp(26px, 4vw, 40px); line-height: 1.15; letter-spacing: -0.02em; color: #FFFFFF;\">{{ t.title }}<\u002Fh1>\n      <p style=\"margin: 14px 0 0; max-width: 720px; font-size: 15px; line-height: 1.7; color: var(--keihan-silver);\">{{ t.subtitle }}<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Category tabs -->\n  <div class=\"kx-tabs\" style=\"max-width: 1160px; margin: 0 auto;\">\n    <div style=\"display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); gap: 12px;\">\n      <sc-for list=\"{{ cats }}\" as=\"ct\" hint-placeholder-count=\"3\">\n        <button onclick=\"{{ ct.onClick }}\" style=\"{{ ct.style }}\">\n          <span style=\"{{ ct.badgeStyle }}\">{{ ct.badge }}<\u002Fspan>\n          <span style=\"display: block; margin-top: 10px; font-size: 17px; font-weight: 600; letter-spacing: -0.01em;\">{{ ct.name }}<\u002Fspan>\n          <span style=\"{{ ct.subStyle }}\">{{ ct.ja }}<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fsc-for>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Main -->\n  <div class=\"kx-wrap\" style=\"max-width: 1160px; margin: 0 auto;\">\n    <div class=\"kx-main\">\n\n      <!-- Form -->\n      <div class=\"kx-form\">\n        <sc-for list=\"{{ sections }}\" as=\"sec\" hint-placeholder-count=\"6\">\n          <section class=\"kx-sec\" style=\"background: var(--keihan-paper); border: 1px solid var(--keihan-line); border-radius: 10px;\">\n            <div style=\"display: flex; align-items: baseline; justify-content: space-between; gap: 12px;\">\n              <h4 style=\"font-size: 17px; font-weight: 600; margin: 0;\">{{ sec.title }}<\u002Fh4>\n              <span style=\"font-family: var(--font-mono); font-size: 11px; color: var(--keihan-fg-3); letter-spacing: 0.04em; white-space: nowrap;\">{{ sec.mode }}<\u002Fspan>\n            <\u002Fdiv>\n            <sc-if value=\"{{ sec.note }}\" hint-placeholder-val=\"{{ false }}\">\n              <p style=\"margin: 6px 0 0; font-size: 12.5px; line-height: 1.6; color: var(--keihan-fg-3);\">{{ sec.note }}<\u002Fp>\n            <\u002Fsc-if>\n            <div style=\"display: flex; flex-direction: column; gap: 8px; margin-top: 16px;\">\n              <sc-for list=\"{{ sec.items }}\" as=\"it\" hint-placeholder-count=\"4\">\n                <div onclick=\"{{ it.onClick }}\" style=\"{{ it.rowStyle }}\">\n                  <div style=\"display: flex; align-items: center; gap: 12px; min-width: 0;\">\n                    <span style=\"{{ it.indStyle }}\">{{ it.indMark }}<\u002Fspan>\n                    <span style=\"font-size: 14px; line-height: 1.45;\">{{ it.label }}<\u002Fspan>\n                  <\u002Fdiv>\n                  <span style=\"{{ it.ptsStyle }}\">{{ it.ptsText }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsection>\n        <\u002Fsc-for>\n\n        <p style=\"margin: 4px 2px 0; font-size: 12px; line-height: 1.7; color: var(--keihan-fg-3);\">{{ t.disclaimer }}<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- Score panel -->\n      <aside class=\"kx-side\">\n        <div class=\"kx-scard\" style=\"background: var(--keihan-paper); border: 1px solid var(--keihan-line); border-radius: 10px; box-shadow: var(--shadow-deck);\">\n          <div style=\"font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--keihan-fg-3);\">{{ t.scoreLabel }}<\u002Fdiv>\n          <div style=\"display: flex; align-items: baseline; gap: 8px; margin-top: 10px;\">\n            <span style=\"font-family: var(--font-display); font-weight: 800; font-size: 72px; line-height: 0.9; letter-spacing: -0.02em; color: var(--keihan-navy); font-feature-settings: 'tnum' 1;\">{{ scoreText }}<\u002Fspan>\n            <span style=\"font-size: 15px; font-weight: 500; color: var(--keihan-fg-3);\">{{ t.unit }}<\u002Fspan>\n          <\u002Fdiv>\n\n          <!-- Progress -->\n          <div style=\"margin-top: 22px;\">\n            <div style=\"position: relative; height: 6px; background: var(--keihan-navy-50); border-radius: 3px;\">\n              <div style=\"{{ fillStyle }}\"><\u002Fdiv>\n              <div style=\"position: absolute; left: 70%; top: -4px; width: 1.5px; height: 14px; background: var(--keihan-silver-deep);\"><\u002Fdiv>\n              <div style=\"position: absolute; left: 80%; top: -4px; width: 1.5px; height: 14px; background: var(--keihan-silver-deep);\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div style=\"position: relative; height: 16px; margin-top: 6px; font-family: var(--font-mono); font-size: 11px; color: var(--keihan-fg-3);\">\n              <span style=\"position: absolute; left: 0;\">0<\u002Fspan>\n              <span style=\"position: absolute; left: 70%; transform: translateX(-50%);\">70<\u002Fspan>\n              <span style=\"position: absolute; left: 80%; transform: translateX(-50%);\">80<\u002Fspan>\n              <span style=\"position: absolute; right: 0;\">100<\u002Fspan>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Threshold statuses -->\n          <div style=\"display: flex; flex-direction: column; gap: 8px; margin-top: 14px;\">\n            <sc-for list=\"{{ statuses }}\" as=\"st\" hint-placeholder-count=\"2\">\n              <div style=\"display: flex; align-items: center; justify-content: space-between; gap: 10px; border: 1px solid var(--keihan-line); border-radius: 6px; padding: 10px 12px;\">\n                <div style=\"display: flex; align-items: baseline; gap: 10px;\">\n                  <span style=\"font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--keihan-navy);\">{{ st.pts }}<\u002Fspan>\n                  <span style=\"font-size: 13px; font-weight: 500;\">{{ st.name }}<\u002Fspan>\n                <\u002Fdiv>\n                <span style=\"{{ st.badgeStyle }}\">{{ st.badgeText }}<\u002Fspan>\n              <\u002Fdiv>\n            <\u002Fsc-for>\n          <\u002Fdiv>\n\n          <!-- Result / benefits -->\n          <div style=\"margin-top: 16px; background: var(--keihan-navy-50); box-shadow: var(--shadow-inset-line); border-radius: 6px; padding: 14px 16px 14px 20px;\">\n            <div style=\"font-size: 12px; font-weight: 600; letter-spacing: 0.04em; text-transform: uppercase; color: var(--keihan-navy);\">{{ resultTitle }}<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 6px; margin-top: 10px;\">\n              <sc-for list=\"{{ benefits }}\" as=\"bf\" hint-placeholder-count=\"4\">\n                <div style=\"display: flex; gap: 8px; font-size: 12.5px; line-height: 1.55; color: var(--keihan-fg-1);\">\n                  <span style=\"color: var(--keihan-navy); font-weight: 700;\">—<\u002Fspan>\n                  <span>{{ bf.text }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- Warnings -->\n          <sc-if value=\"{{ hasWarnings }}\" hint-placeholder-val=\"{{ false }}\">\n            <div style=\"margin-top: 12px; background: var(--keihan-coral-50); box-shadow: inset 4px 0 0 var(--keihan-coral); border-radius: 6px; padding: 12px 14px 12px 18px; display: flex; flex-direction: column; gap: 6px;\">\n              <sc-for list=\"{{ warnings }}\" as=\"wn\" hint-placeholder-count=\"1\">\n                <div style=\"font-size: 12.5px; line-height: 1.55; color: var(--keihan-coral-deep);\">{{ wn.text }}<\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n\n        <!-- Suggestions -->\n        <sc-if value=\"{{ showSugg }}\" hint-placeholder-val=\"{{ false }}\">\n          <div style=\"margin-top: 16px; background: var(--keihan-paper); border: 1px solid var(--keihan-line); border-radius: 10px; padding: 20px 22px;\">\n            <div style=\"font-size: 11px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase; color: var(--keihan-fg-3);\">{{ t.suggTitle }}<\u002Fdiv>\n            <div style=\"margin-top: 8px; font-size: 13.5px; font-weight: 600; color: var(--keihan-navy);\">{{ gapText }}<\u002Fdiv>\n            <div style=\"display: flex; flex-direction: column; gap: 8px; margin-top: 12px;\">\n              <sc-for list=\"{{ suggestions }}\" as=\"sg\" hint-placeholder-count=\"3\">\n                <div style=\"display: flex; align-items: baseline; gap: 12px; border-top: 1px solid var(--keihan-line-soft); padding-top: 8px;\">\n                  <span style=\"font-family: var(--font-mono); font-size: 13px; font-weight: 700; color: var(--keihan-blue); white-space: nowrap;\">{{ sg.pts }}<\u002Fspan>\n                  <span style=\"font-size: 12.5px; line-height: 1.5; color: var(--keihan-fg-2);\">{{ sg.label }}<\u002Fspan>\n                <\u002Fdiv>\n              <\u002Fsc-for>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fsc-if>\n      <\u002Faside>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <!-- Footer -->\n  <footer style=\"background: var(--keihan-navy); \">\n    <div style=\"max-width: 1160px; margin: 0 auto; padding: 22px 24px; display: flex; justify-content: space-between; gap: 16px; flex-wrap: wrap; align-items: baseline;\">\n      <div style=\"font-size: 12px; color: var(--keihan-silver);\">© 京阪住業株式会社 KEIHAN JUGYO K.K.<\u002Fdiv>\n      <div style=\"font-family: var(--font-mono); font-size: 12px;\"><a href=\"https://keihan.co\" style=\"color: var(--keihan-silver); border-bottom: none;\">keihan.co<\u002Fa><\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n  <!-- Mobile sticky score bar -->\n  <div class=\"kx-mbar\" style=\"position: fixed; left: 0; right: 0; bottom: 0; z-index: 50; background: var(--keihan-navy); box-shadow: 0 -6px 20px rgba(17, 32, 53, 0.25); padding: 12px 16px calc(12px + env(safe-area-inset-bottom)); align-items: center; gap: 14px;\">\n    <div style=\"display: flex; align-items: baseline; gap: 5px; flex: none;\">\n      <span style=\"font-family: var(--font-display); font-weight: 800; font-size: 34px; line-height: 0.9; letter-spacing: -0.02em; color: #FFFFFF; font-feature-settings: 'tnum' 1;\">{{ scoreText }}<\u002Fspan>\n      <span style=\"font-size: 12px; font-weight: 500; color: var(--keihan-silver);\">{{ t.unit }}<\u002Fspan>\n    <\u002Fdiv>\n    <div style=\"flex: 1; min-width: 0;\">\n      <div style=\"position: relative; height: 5px; background: rgba(255,255,255,0.18); border-radius: 3px;\">\n        <div style=\"{{ mbarFillStyle }}\"><\u002Fdiv>\n        <div style=\"position: absolute; left: 70%; top: -3px; width: 1.5px; height: 11px; background: var(--keihan-silver-deep);\"><\u002Fdiv>\n        <div style=\"position: absolute; left: 80%; top: -3px; width: 1.5px; height: 11px; background: var(--keihan-silver-deep);\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"margin-top: 7px; font-size: 11.5px; line-height: 1.35; color: var(--keihan-silver); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\">{{ mbarText }}<\u002Fdiv>\n    <\u002Fdiv>\n    <span style=\"{{ mbarBadgeStyle }}\">{{ mbarBadge }}<\u002Fspan>\n  <\u002Fdiv>\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;: {&quot;width&quot;: 1280, &quot;height&quot;: 900}, &quot;defaultLang&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;zh&quot;, &quot;tw&quot;, &quot;ja&quot;, &quot;ko&quot;, &quot;en&quot;], &quot;default&quot;: &quot;zh&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Defaults&quot;}, &quot;defaultCategory&quot;: {&quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;a&quot;, &quot;b&quot;, &quot;c&quot;], &quot;default&quot;: &quot;c&quot;, &quot;tsType&quot;: &quot;string&quot;, &quot;section&quot;: &quot;Defaults&quot;}}\">\nclass Component extends DCLogic {\n  state = {\n    lang: null,\n    cat: null,\n    sel: { a: {}, b: {}, c: {} },\n  };\n\n  // ---------- static data ----------\n  get L() { return this.state.lang ?? this.props.defaultLang ?? 'zh'; }\n  get C() { return this.state.cat ?? this.props.defaultCategory ?? 'c'; }\n\n  UI = {\n    brandSub: { zh: '高度人才积分评估', tw: '高度人才積分評估', ja: '高度人材ポイント計算', ko: '고도인재 포인트 평가', en: 'HSP Points Calculator' },\n    title: {\n      zh: '日本高度人才签证 · 积分自测',\n      tw: '日本高度人才簽證 · 積分自測',\n      ja: '高度人材ポイント制 セルフチェック',\n      ko: '일본 고도인재 비자 · 포인트 자가진단',\n      en: 'Japan Highly Skilled Professional — Points Self-Assessment',\n    },\n    subtitle: {\n      zh: '按出入国在留管理厅官方打分表勾选您的条件，右侧实时计算得分。70 分即符合高度人才签证要求，80 分最快 1 年可申请永住。',\n      tw: '按出入國在留管理廳官方打分表勾選您的條件，右側即時計算得分。70 分即符合高度人才簽證要求，80 分最快 1 年可申請永住。',\n      ja: '出入国在留管理庁のポイント表に基づき該当項目を選択すると、合計点を自動計算します。70点で高度専門職に該当、80点で永住申請が最短1年。',\n      ko: '출입국재류관리청 공식 포인트표에 따라 해당 항목을 선택하면 오른쪽에서 점수를 실시간 계산합니다. 70점이면 고도인재 비자 요건 충족, 80점이면 최단 1년 만에 영주 신청이 가능합니다.',\n      en: 'Check the items that apply to you, per the official Immigration Services Agency point table. 70 points qualifies for HSP status; 80 points unlocks the 1-year permanent-residency track.',\n    },\n    scoreLabel: { zh: '当前得分', tw: '當前得分', ja: '現在の合計', ko: '현재 점수', en: 'Current score' },\n    unit: { zh: '分', tw: '分', ja: '点', ko: '점', en: 'pts' },\n    t70: { zh: '高度人才资格', tw: '高度人才資格', ja: '高度専門職に該当', ko: '고도인재 자격', en: 'HSP threshold' },\n    t80: { zh: '永住 1 年通道', tw: '永住 1 年通道', ja: '永住許可 最短1年', ko: '영주 1년 트랙', en: '1-year PR track' },\n    met: { zh: '已达成', tw: '已達成', ja: '達成', ko: '달성', en: 'Met' },\n    notMet: { zh: '未达成', tw: '未達成', ja: '未達', ko: '미달성', en: 'Not yet' },\n    resultBelow: { zh: '达到 70 分可享待遇', tw: '達到 70 分可享待遇', ja: '70点到達で受けられる優遇', ko: '70점 도달 시 받는 우대', en: 'Benefits at 70 points' },\n    result70: { zh: '您已符合高度人才签证', tw: '您已符合高度人才簽證', ja: '高度専門職に該当します', ko: '고도인재 비자 요건을 충족합니다', en: 'You qualify for HSP status' },\n    result80: { zh: '已达 80 分 · 最快永住通道', tw: '已達 80 分 · 最快永住通道', ja: '80点到達 · 永住まで最短1年', ko: '80점 달성 · 최단 영주 트랙', en: '80 points — fastest PR track' },\n    suggTitle: { zh: '提升建议', tw: '提升建議', ja: '加点のヒント', ko: '점수 향상 팁', en: 'Closing the gap' },\n    gap70: { zh: (n) => `距 70 分还差 ${n} 分`, tw: (n) => `距 70 分還差 ${n} 分`, ja: (n) => `70点まであと${n}点`, ko: (n) => `70점까지 ${n}점 부족`, en: (n) => `${n} points to reach 70` },\n    gap80: { zh: (n) => `已达 70 分，距 80 分还差 ${n} 分`, tw: (n) => `已達 70 分，距 80 分還差 ${n} 分`, ja: (n) => `70点達成、80点まであと${n}点`, ko: (n) => `70점 달성, 80점까지 ${n}점 부족`, en: (n) => `70 reached — ${n} points to 80` },\n    single: { zh: '单选', tw: '單選', ja: '択一', ko: '단일 선택', en: 'pick one' },\n    multi: { zh: '可多选', tw: '可多選', ja: '複数可', ko: '복수 선택', en: 'multiple' },\n    disclaimer: {\n      zh: '本工具依据高度専門職省令积分表编制，仅供参考；能否认定以日本出入国在留管理厅的实际审查为准。年收指来日后预定年收入（含奖金）。',\n      tw: '本工具依據高度專門職省令積分表編制，僅供參考；能否認定以日本出入國在留管理廳的實際審查為準。年收指來日後預定年收入（含獎金）。',\n      ja: '本ツールは高度専門職省令のポイント表に基づく参考計算です。認定の可否は出入国在留管理庁の審査によります。年収は入国後の予定年収（賞与含む）。',\n      ko: '본 도구는 고도전문직 성령 포인트표를 기반으로 한 참고용 계산이며, 인정 여부는 일본 출입국재류관리청의 심사에 따릅니다. 연수입은 입국 후 예정 연수입(상여 포함)을 말합니다.',\n      en: 'Based on the ministerial-ordinance point table; for reference only — final determination rests with the Immigration Services Agency of Japan. Income = expected annual salary in Japan incl. bonus.',\n    },\n    n2warn: {\n      zh: '日语 N2 加分不可与「日本大学毕业」加分同时计算，已按 0 分处理。',\n      tw: '日語 N2 加分不可與「日本大學畢業」加分同時計算，已按 0 分處理。',\n      ja: 'N2 の加点は「本邦の大学卒業」との併用不可のため 0 点で計算しています。',\n      ko: 'N2 가점은 「일본 대학 졸업」 가점과 병용할 수 없어 0점으로 처리했습니다.',\n      en: 'The N2 bonus cannot be combined with the Japanese-university bonus; counted as 0.',\n    },\n    smeWarn: {\n      zh: '「中小企业」加分需同时勾选创新促进支援措施一项，暂按 0 分处理。',\n      tw: '「中小企業」加分需同時勾選創新促進支援措施一項，暫按 0 分處理。',\n      ja: '中小企業の加点はイノベーション促進支援措置と併せて該当する場合のみ有効です（0点で計算）。',\n      ko: '「중소기업」 가점은 이노베이션 촉진 지원조치 항목과 함께 선택해야       return { sel: { ...s.sel, [cat]: cur } };\n    });\n  }\n\n  toggleCheck(id) { this.setSel((cur) => { cur[id] = !cur[id]; }); }\n  pickRadio(key, id) { this.setSel((cur) => { cur[key] = cur[key] === id ? null : id; }); }\n\n  ageKey(sel) { return sel.age || 'o40'; }\n\n  incomePts(cat, sel) {\n    const inc = sel.income;\n    if (!inc) return 0;\n    if (cat === 'c') return ({ c3000: 50, c2500: 40, c2000: 30, c1500: 20, c1000: 10 })[inc] || 0;\n    const row = this.INCOME_MATRIX[inc];\n    return row ? row[this.ageKey(sel)] : 0;\n  }\n\n  researchPts(cat, sel) {\n    const n = ['patent', 'grant', 'paper', 'rother'].filter((k) => sel[k]).length;\n    if (cat === 'a') return n >= 2 ? 25 : n === 1 ? 20 : 0;\n    if (cat === 'b') return n >= 1 ? 15 : 0;\n    return 0;\n  }\n\n  compute() {\n    const cat = this.C;\n    const sel = this.state.sel[cat] || {};\n    const warnings = [];\n    let total = 0;\n\n    const eduPts = { phd: { a: 30, b: 30, c: 20 }, master: { a: 20, b: 20, c: 20 }, bachelor: { a: 10, b: 10, c: 10 } };\n    if (sel.edu) total += eduPts[sel.edu]?.[cat] || 0;\n    if (sel.multiDeg) total += 5;\n    if (cat === 'c' && sel.mba) total += 5;\n\n    const careerPts = { y10: { b: 20, c: 25 }, y7: { a: 15, b: 15, c: 20 }, y5: { a: 10, b: 10, c: 15 }, y3: { a: 5, b: 5, c: 10 } };\n    if (sel.career) total += careerPts[sel.career]?.[cat] || 0;\n\n    if (cat !== 'c' && sel.age) total += ({ u30: 15, u35: 10, u40: 5, o40: 0 })[sel.age] || 0;\n\n    total += this.incomePts(cat, sel);\n    total += this.researchPts(cat, sel);\n\n    if (cat === 'c' && sel.pos) total += ({ daihyo: 10, yakuin: 5 })[sel.pos] || 0;\n\n    if (sel.jp === 'n1') total += 15;\n    else if (sel.jp === 'n2') {\n      if (sel.jpUniv) warnings.push(this.tx(this.UI.n2warn));\n      else total += 10;\n    }\n\n    if (sel.jpUniv) total += 10;\n    if (sel.univ) total += 10;\n    if (sel.inno) total += 10;\n    if (sel.sme) { if (sel.inno) total += 10; else warnings.push(this.tx(this.UI.smeWarn)); }\n    if (sel.rnd) total += 5;\n    if (sel.growth) total += 10;\n    if (sel.localGov) total += 10;\n    if (sel.jica) total += 5;\n    if (cat === 'b' && sel.shikaku) total += sel.shikaku === 'shikaku2' ? 10 : 5;\n    if (cat === 'b' && sel.foreignQual) total += 5;\n    if (cat === 'c' && sel.invest) total += 5;\n    if ((cat === 'b' || cat === 'c') && sel.fund) total += 10;\n\n    return { total, warnings, sel, cat };\n  }\n\n  sec(id) { return this.SECTIONS.find((s) => s.id === id); }\n\n  suggestions(cat, sel, total) {\n    const out = [];\n    const push = (pts, label) => { if (pts > 0) out.push({ pts: '+' + pts, n: pts, label }); };\n    // Japanese upgrade\n    if (sel.jp !== 'n1') push(sel.jp === 'n2' && !sel.jpUniv ? 5 : 15, this.tx(this.sec('jp').items[0].label));\n    // education upgrade to doctorate / master\n    const eduTop = cat === 'c' ? 20 : 30;\n    const eduCur = sel.edu ? ({ phd: eduTop, master: 20, bachelor: 10 })[sel.edu] : 0;\n    if (eduCur < eduTop) push(eduTop - eduCur, this.tx({ zh: '取得更高学位（博士/硕士）', tw: '取得更高學位（博士/碩士）', ja: 'より高い学位の取得（博士・修士）', ko: '더 높은 학위 취득(박사/석사)', en: 'Earn a higher degree (PhD / Master’s)' }));\n    // position (c)\n    if (cat === 'c' && sel.pos !== 'daihyo') push(sel.pos === 'yakuin' ? 5 : 10, this.tx(this.sec('pos').items[0].label));\n    // research (a/b)\n    if (cat !== 'c') {\n      const n = ['patent', 'grant', 'paper', 'rother'].filter((k) => sel[k]).length;\n      const next = cat === 'a' ? (n === 0 ? 20 : n === 1 ? 5 : 0) : (n === 0 ? 15 : 0);\n      if (next) push(next, this.tx({ zh: '补充一项研究实绩（专利/论文等）', tw: '補充一項研究實績（專利/論文等）', ja: '研究実績を1つ追加（特許・論文等）', ko: '연구 실적 1개 추가(특허/논문 등)', en: 'Add one research achievement (patent / papers)' }));\n    }\n    // unchecked bonus checks\n    const bonus = this.sec('bonus').items;\n    for (const it of bonus) {\n      if (it.kind !== 'check') continue;\n      const p = it.pts[cat];\n      if (p == null || p === 0) continue;\n      if (sel[it.id]) continue;\n      if (it.id === 'sme' && !sel.inno) continue;\n      push(p, this.tx(it.label));\n    }\n    if (cat === 'b' && sel.shikaku !== 'shikaku2') push(sel.shikaku === 'shikaku1' ? 5 : 10, this.tx({ zh: '考取职务相关的日本国家资格', tw: '考取職務相關的日本國家資格', ja: '職務関連の国家資格を取得', ko: '직무 관련 일본 국가자격 취득', en: 'Obtain job-related national qualifications' }));\n    if (!sel.univ) push(10, this.tx({ zh: '确认母校是否属于指定大学（世界前 300 / SGU / Innovative Asia）', tw: '確認母校是否屬於指定大學（世界前 300 / SGU / Innovative Asia）', ja: '出身校が告示大学（世界300位以内・SGU・イノベーティブアジア）か確認', ko: '출신교가 지정 대학(세계 300위 / SGU / Innovative Asia)인지 확인', en: 'Check if your alma mater is a designated university (top-300 / SGU / Innovative Asia)' }));\n    out.sort((x, y) => y.n - x.n);\n    return out.slice(0, 5);\n  }\n\n  // ---------- render ----------\n  renderVals() {\n    const lang = this.L, cat = this.C;\n    const t = {};\n    for (const k of Object.keys(this.UI)) {\n      const v = this.UI[k];\n      t[k] = typeof v[lang] === 'function' ? v[lang] : this.tx(v);\n    }\n\n    const { total, warnings, sel } = this.compute();\n\n    // language buttons\n    const LANGS = [ ['zh', '简体'], ['tw', '繁體'], ['ja', '日本語'], ['ko', '한국어'], ['en', 'EN'] ];\n    const langs = LANGS.map(([id, label]) => ({\n      id, label,\n      onClick: () => this.setState({ lang: id }),\n      style: {\n        fontFamily: 'var(--font-sans)', fontSize: '12.5px', fontWeight: 600, letterSpacing: '0.02em',\n        padding: '7px 12px', borderRadius: '6px', cursor: 'pointer',\n        border: id === lang ? '1px solid var(--keihan-navy)' : '1px solid var(--keihan-line)',\n        background: id === lang ? 'var(--keihan-navy)' : 'var(--keihan-paper)',\n        color: id === lang ? '#fff' : 'var(--keihan-fg-2)',\n        transition: 'all 200ms var(--ease-out)',\n      },\n    }));\n\n    // category tabs\n    const cats = this.CATS.map((c) => {\n      const on = c.id === cat;\n      return {\n        id: c.id, name: this.tx(c.name), ja: c.ja, badge: c.badge,\n        onClick: () => this.setState({ cat: c.id }),\n        style: {\n          textAlign: 'left', cursor: 'pointer', borderRadius: '10px', padding: '18px 20px',\n          border: on ? '1px solid var(--keihan-navy)' : '1px solid var(--keihan-line)',\n          background: on ? 'var(--keihan-navy)' : 'var(--keihan-paper)',\n          color: on ? '#fff' : 'var(--keihan-fg-1)',\n          boxShadow: on ? 'var(--shadow-deck)' : 'none',\n          transition: 'all 200ms var(--ease-out)', fontFamily: 'var(--font-sans)',\n        },\n        badgeStyle: {\n          fontFamily: 'var(--font-mono)', fontSize: '11px', fontWeight: 700, letterSpacing: '0.1em',\n          padding: '3px 8px', borderRadius: '4px',\n          background: on ? 'rgba(255,255,255,0.14)' : 'var(--keihan-navy-50)',\n          color: on ? 'var(--keihan-silver)' : 'var(--keihan-navy)',\n        },\n        subStyle: { display: 'block', marginTop: '4px', fontSize: '11.5px', letterSpacing: '0.04em', color: on ? 'var(--keihan-silver)' : 'var(--keihan-fg-3)' },\n      };\n    });\n\n    // sections\n    const sections = [];\n    for (const S of this.SECTIONS) {\n      if (!S.cats.includes(cat)) continue;\n      let items = S.items;\n      let note = S.note ? this.tx(S.note) : null;\n      if (S.id === 'income') { items = cat === 'c' ? S.itemsC : S.itemsAB; note = this.tx(cat === 'c' ? S.noteC : S.noteAB); }\n      if (S.id === 'research') note = this.tx(cat === 'a' ? S.noteA : S.noteB);\n\n      const rows = [];\n      let hasRadio = false, hasCheck = false;\n      for (const it of items) {\n        let pts;\n        if (S.id === 'income' && cat !== 'c') {\n          pts = this.INCOME_MATRIX[it.id][this.ageKey(sel)];\n        } else if (S.id === 'research') {\n          pts = null; // shown as check without fixed pts\n        } else {\n          pts = it.pts ? it.pts[cat] : null;\n          if (pts === null || pts === undefined) continue;\n        }\n        const isRadio = it.kind === 'radio';\n        if (isRadio) hasRadio = true; else hasCheck = true;\n        const asRadioLook = isRadio && S.id !== 'bonus'; // bonus 区全部统一为方形勾选框样式\n        const on = isRadio ? sel[it.key] === it.id : !!sel[it.id];\n        const dim = pts === 0 && S.id === 'income';\n        rows.push({\n          id: it.id,\n          label: this.tx(it.label),\n          ptsText: S.id === 'research' ? '✓' : (pts === 0 ? '+0' : '+' + pts),\n          onClick: () => (isRadio ? this.pickRadio(it.key, it.id) : this.toggleCheck(it.id)),\n          rowStyle: {\n            display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '14px',\n            padding: '11px 14px', borderRadius: '6px', cursor: 'pointer', userSelect: 'none',\n            border: on ? '1px solid var(--keihan-navy)' : '1px solid var(--keihan-line)',\n            background: on ? 'var(--keihan-navy)' : 'var(--keihan-paper)',\n            color: on ? '#fff' : (dim ? 'var(--keihan-fg-4)' : 'var(--keihan-fg-1)'),\n            transition: 'background 120ms var(--ease-out), border-color 120ms var(--ease-out)',\n          },\n          indStyle: {\n            flex: 'none', width: '16px', height: '16px', display: 'inline-flex', alignItems: 'center', justifyContent: 'center',\n            borderRadius: asRadioLook ? '50%' : '3px',\n            border: on ? '1px solid #fff' : '1px solid var(--keihan-silver-deep)',\n            background: on ? '#fff' : 'transparent',\n            color: 'var(--keihan-navy)', fontSize: '10px', fontWeight: 800, lineHeight: 1,\n          },\n          indMark: on ? (asRadioLook ? '●' : '✓') : '',\n          ptsStyle: {\n            flex: 'none', fontFamily: 'var(--font-mono)', fontSize: '13px', fontWeight: 700,\n            color: on ? 'var(--keihan-silver)' : (dim ? 'var(--keihan-fg-4)' : 'var(--keihan-navy)'),\n          },\n        });\n      }\n      if (!rows.length) continue;\n      sections.push({\n        id: S.id,\n        title: this.tx(S.title),\n        note,\n        mode: hasRadio && !hasCheck ? t.single : (!hasRadio ? t.multi : t.single + ' + ' + t.multi),\n        items: rows,\n      });\n    }\n\n    // score panel\n    const pct = Math.min(100, total);\n    const statuses = [\n      { pts: '70', name: t.t70, met: total >= 70 },\n      { pts: '80', name: t.t80, met: total >= 80 },\n    ].map((s) => ({\n      ...s,\n      badgeText: s.met ? t.met : t.notMet,\n      badgeStyle: {\n        fontSize: '11px', fontWeight: 700, letterSpacing: '0.06em', padding: '3px 9px', borderRadius: '999px',\n        background: s.met ? 'var(--keihan-navy)' : 'var(--keihan-bg)',\n        color: s.met ? '#fff' : 'var(--keihan-fg-3)',\n        border: s.met ? '1px solid var(--keihan-navy)' : '1px solid var(--keihan-line)',\n      },\n    }));\n\n    const resultTitle = total >= 80 ? t.result80 : total >= 70 ? t.result70 : t.resultBelow;\n    const benefits = (this.BENEFITS[lang] || this.BENEFITS.zh).map((x) => ({ text: x }));\n\n    const gap70 = 70 - total, gap80 = 80 - total;\n    const showSugg = total < 80;\n    const gapText = total < 70 ? t.gap70(gap70) : t.gap80(gap80);\n    const suggList = showSugg ? this.suggestions(cat, sel, total) : [];\n\n    return {\n      t,\n      langs, cats, sections,\n      scoreText: String(total),\n      unitLabel: t.unit,\n      fillStyle: {\n        position: 'absolute', left: 0, top: 0, bottom: 0, width: pct + '%',\n        background: total >= 70 ? 'var(--keihan-navy)' : 'var(--keihan-navy-200)',\n        borderRadius: '3px', transition: 'width 320ms var(--ease-out), background 320ms var(--ease-out)',\n      },\n      statuses,\n      resultTitle,\n      benefits,\n      hasWarnings: warnings.length > 0,\n      warnings: warnings.map((w) => ({ text: w })),\n      showSugg,\n      gapText,\n      suggestions: suggList,\n      mbarText: total < 70 ? gapText : resultTitle,\n      mbarBadge: total >= 70 ? '70+' : String(total) + ' / 70',\n      mbarBadgeStyle: {\n        flex: 'none', fontFamily: 'var(--font-mono)', fontSize: '11px', fontWeight: 700, letterSpacing: '0.04em',\n        padding: '5px 10px', borderRadius: '999px',\n        background: total >= 70 ? '#FFFFFF' : 'rgba(255,255,255,0.12)',\n        color: total >= 70 ? 'var(--keihan-navy)' : 'var(--keihan-silver)',\n        border: '1px solid ' + (total >= 70 ? '#FFFFFF' : 'rgba(255,255,255,0.25)'),\n      },\n      mbarFillStyle: {\n        position: 'absolute', left: 0, top: 0, bottom: 0, width: pct + '%',\n        background: total >= 70 ? '#FFFFFF' : 'var(--keihan-silver)',\n        borderRadius: '3px', transition: 'width 320ms var(--ease-out)',\n      },\n    };\n  }\n}\n<\u002Fscript>\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
