<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <style>
    :root {
      --navy: #112035;
      --navy-soft: #1A2D45;
      --navy-50: #EEF0F4;
      --navy-100: #D6DCE5;
      --ink: #0A0A0A;
      --ink-soft: #1F1F1F;
      --paper: #FFFFFF;
      --bg: #F3F4F6;
      --bg-warm: #EFEFEF;
      --line: #E5E5E5;
      --line-soft: #EFEFEF;
      --silver: #C9CED6;
      --silver-deep: #9EA5B0;
      --blue: #2D49E8;
      --blue-deep: #1F36C2;
      --coral: #E94B3C;
      --ok: #16A34A;
      --warn: #D97706;
      --font-body: 'Roboto', 'Noto Sans JP', 'Noto Sans SC', system-ui, sans-serif;
      --font-mono: 'JetBrains Mono', 'SF Mono', ui-monospace, monospace;
      --radius: 6px;
      --radius-lg: 10px;
      --motion: 180ms;
      --ease: cubic-bezier(0.2, 0, 0, 1);
    }
    *, *::before, *::after { box-sizing: border-box; }
    html { -webkit-text-size-adjust: 100%; scroll-behavior: smooth; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-size: 15px;
      line-height: 1.55;
      -webkit-font-smoothing: antialiased;
    }

    .topbar {
      background: var(--navy);
      color: var(--paper);
      padding: 10px 0;
      position: sticky; top: 0; z-index: 100;
    }
    .topbar-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 10px;
    }
    .topbar-brand {
      font-size: 14px;
      font-weight: 500;
      letter-spacing: 0.02em;
      color: var(--silver);
    }
    .topbar-tools {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-wrap: wrap;
    }
    .home-btn {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border: 1px solid rgba(255,255,255,0.22);
      border-radius: var(--radius);
      background: transparent;
      color: var(--silver);
      font-family: var(--font-body);
      font-size: 12px;
      font-weight: 500;
      text-decoration: none;
      transition: all var(--motion) var(--ease);
      white-space: nowrap;
    }
    .home-btn:hover {
      border-color: rgba(255,255,255,0.5);
      color: var(--paper);
      background: rgba(255,255,255,0.06);
    }
    .home-btn .arrow { font-size: 13px; line-height: 1; }
    .lang-tabs {
      display: flex;
      gap: 2px;
      background: rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 3px;
    }
    .lang-tab {
      border: 0;
      background: transparent;
      color: var(--silver);
      font-family: var(--font-body);
      font-size: 12px;
      padding: 5px 10px;
      border-radius: 4px;
      cursor: pointer;
      transition: all var(--motion) var(--ease);
      white-space: nowrap;
    }
    .lang-tab:hover { color: var(--paper); }
    .lang-tab.active { background: rgba(255,255,255,0.15); color: var(--paper); font-weight: 500; }

    .score-sticky {
      position: sticky; top: 51px; z-index: 90;
      background: var(--paper);
      border-bottom: 1px solid var(--line);
      padding: 14px 0;
    }
    .score-inner {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }
    .score-label {
      font-size: 13px;
      color: var(--silver-deep);
      letter-spacing: 0.03em;
      text-transform: uppercase;
    }
    .score-value {
      font-family: var(--font-mono);
      font-size: 48px;
      font-weight: 600;
      color: var(--navy);
      line-height: 1;
      letter-spacing: -0.02em;
    }
    .score-value.pass { color: var(--ok); }
    .score-value.fail { color: var(--coral); }
    .score-threshold {
      font-size: 12px;
      color: var(--silver-deep);
    }
    .score-threshold b { color: var(--ink); }

    .field-selector {
      display: flex;
      gap: 0;
      border: 1px solid var(--line);
      border-radius: var(--radius);
      overflow: hidden;
    }
    .field-btn {
      border: 0;
      background: var(--paper);
      color: var(--ink-soft);
      font-family: var(--font-body);
      font-size: 13px;
      padding: 8px 14px;
      cursor: pointer;
      transition: all var(--motion) var(--ease);
      white-space: nowrap;
      border-right: 1px solid var(--line);
    }
    .field-btn:last-child { border-right: 0; }
    .field-btn:hover { background: var(--navy-50); }
    .field-btn.active { background: var(--navy); color: var(--paper); font-weight: 500; }

    .container {
      max-width: 960px;
      margin: 0 auto;
      padding: 0 20px;
    }

    main { padding: 32px 0 80px; }

    .category {
      background: var(--paper);
      border: 1px solid var(--line);
      border-radius: var(--radius-lg);
      margin-bottom: 16px;
      overflow: hidden;
    }
    .cat-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--navy-50);
      border-bottom: 1px solid var(--line-soft);
      cursor: pointer;
      user-select: none;
      transition: background var(--motion) var(--ease);
    }
    .cat-header:hover { background: var(--navy-100); }
    .cat-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--navy);
    }
    .cat-subtotal {
      font-family: var(--font-mono);
      font-size: 14px;
      font-weight: 500;
      color: var(--silver-deep);
    }
    .cat-subtotal.has-score { color: var(--blue); font-weight: 600; }
    .cat-body { padding: 16px 20px; }

    .option-group { margin-bottom: 14px; }
    .option-group:last-child { margin-bottom: 0; }
    .opt-label {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border-radius: var(--radius);
      cursor: pointer;
      transition: background var(--motion) var(--ease);
      font-size: 14px;
      line-height: 1.4;
    }
    .opt-label:hover { background: var(--navy-50); }
    .opt-label input[type="radio"],
    .opt-label input[type="checkbox"] {
      appearance: none;
      width: 18px; height: 18px;
      border: 1.5px solid var(--silver);
      border-radius: 3px;
      flex-shrink: 0;
      cursor: pointer;
      transition: all var(--motion) var(--ease);
      display: grid; place-items: center;
    }
    .opt-label input[type="radio"] { border-radius: 50%; }
    .opt-label input:checked {
      background: var(--blue);
      border-color: var(--blue);
    }
    .opt-label input[type="checkbox"]:checked::after {
      content: '';
      width: 8px; height: 4px;
      border: 1.5px solid var(--paper);
      border-top: 0; border-right: 0;
      transform: rotate(-45deg) translate(0.5px, -1px);
    }
    .opt-label input[type="radio"]:checked::after {
      content: '';
      width: 6px; height: 6px;
      background: var(--paper);
      border-radius: 50%;
    }
    .opt-label.selected {
      background: var(--blue);
      color: var(--paper);
    }
    .opt-label.selected .opt-pts { color: rgba(255,255,255,0.75); }
    .opt-pts {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--silver-deep);
      white-space: nowrap;
      margin-left: auto;
      flex-shrink: 0;
    }

    .income-grid {
      display: grid;
      grid-template-columns: 1fr repeat(4, auto);
      gap: 0;
      font-size: 13px;
    }
    .income-grid .ig-h { font-weight: 500; color: var(--silver-deep); padding: 6px 10px; text-align: center; }
    .income-grid .ig-row-label { padding: 6px 10px; font-weight: 500; }
    .income-grid .ig-cell { text-align: center; padding: 6px 10px; }
    .income-opt {
      display: inline-block;
      width: 100%;
      padding: 4px 0;
      border-radius: 3px;
      cursor: pointer;
      transition: all var(--motion) var(--ease);
      color: var(--silver-deep);
    }
    .income-opt:hover { background: var(--navy-50); color: var(--ink); }
    .income-opt.selected { background: var(--blue); color: var(--paper); font-weight: 500; }
    .income-opt.na { color: var(--line); cursor: default; }
    .income-opt.na:hover { background: transparent; color: var(--line); }

    .note {
      font-size: 12px;
      color: var(--silver-deep);
      padding: 10px 14px;
      margin-top: 8px;
      background: var(--navy-50);
      border-radius: var(--radius);
      line-height: 1.5;
    }

    .pagefoot {
      text-align: center;
      padding: 32px 20px;
      color: var(--silver-deep);
      font-size: 12px;
      border-top: 1px solid var(--line);
    }

    @media (max-width: 768px) {
      .topbar-inner { flex-direction: column; align-items: flex-start; }
      .score-inner { flex-direction: column; align-items: flex-start; }
      .score-value { font-size: 36px; }
      .field-btn { padding: 8px 10px; font-size: 12px; }
      .income-grid { font-size: 11px; }
      .income-grid .ig-h { padding: 6px 4px; }
      .income-grid .ig-cell { padding: 6px 4px; }
      .container { padding: 0 12px; }
      .cat-body { padding: 12px; }
      .cat-header { padding: 12px; }
    }
  </style>
</head>

        <button class="lang-tab" data-lang="zh-CN">简体中文</button>
        <button class="lang-tab" data-lang="zh-TW">繁體中文</button>
        <button class="lang-tab" data-lang="en">English</button>
      </div>
    </div>
  </div>
</header>

<div class="score-sticky" data-od-id="score-bar">
  <div class="score-inner">
    <div>

    <div class="field-selector" id="fieldSelector">

      <button class="field-btn" data-field="technical">専門技術</button>
      <button class="field-btn" data-field="management">経営管理</button>
    </div>
  </div>
</div>

<main class="container" data-od-id="calculator-main">
  <form id="calcForm" autocomplete="off"></form>
</main>

<footer class="pagefoot" data-od-id="footer">
  <p>本ツールは参考用です。実際の審査結果は出入国在留管理庁の判断によります。</p>
  <p>© 京阪住業株式会社</p>

function recalcBonus3() {
  const cbs = document.querySelectorAll('input[name="bonus3"]');
  let checked = 0;
  cbs.forEach(cb => { if (cb.checked) checked++; });
  if (checked > 2) {
    cbs.forEach(cb => { if (!cb.checked && checked > 2) { cb.disabled = true; checked--; } });
  } else {
    cbs.forEach(cb => { cb.disabled = false; });
  }
  recalc();
}

function calculateScore() {
  let total = 0;
  const field = currentField;

  const eduVal = document.querySelector('input[name="education"]:checked')?.value;
  if (eduVal) total += SCORING[field].education[eduVal] || 0;
  if (document.querySelector('input[name="eduMulti"]')?.checked) total += 5;
  if (field === 'management' && document.querySelector('input[name="eduMBA"]')?.checked) total += 5;

  const expVal = document.querySelector('input[name="experience"]:checked')?.value;
  if (expVal) total += SCORING[field].experience[expVal] || 0;

  const ageVal = document.querySelector('input[name="age"]:checked')?.value;
  if (ageVal !== undefined && ageVal !== null && ageVal !== '') {
    const ageScore = SCORING[field].age[parseInt(ageVal)] || 0;
    total += ageScore;
  }

  if (selectedIncome >= 0) {
    if (field === 'management') {
      total += SCORING.management.income[selectedIncome] || 0;
    } else if (selectedAge >= 0) {
      total += INCOME_POINTS[field][selectedAge][selectedIncome] || 0;
    }
  }

  if (field === 'academic') {
    const resCount = [
      document.querySelector('input[name="resPatent"]')?.checked,
      document.querySelector('input[name="resGrant"]')?.checked,
      document.querySelector('input[name="resPaper"]')?.checked
    ].filter(Boolean).length;
    if (resCount >= 2) {
      total += 25;
    } else {
      if (document.querySelector('input[name="resPatent"]')?.checked) total += 20;
      if (document.querySelector('input[name="resGrant"]')?.checked) total += 20;
      if (document.querySelector('input[name="resPaper"]')?.checked) total += 20;
    }
  }

  const bonusPoints = {
    bonus1: field === 'academic' ? 0 : 15,
    bonus2: 10,
    bonus3: 5,
    bonus4: 10,
    bonus5: 5,
    bonus6: 5,
    bonus7: 10,
    bonus8: 15,
    bonus9: 10,
    bonus10: 10,
    bonus11: 10,
    bonus12: 5,
    bonus13: 10,
    bonus14: 10,
    bonus15: 5
  };

  for (const [bid, pts] of Object.entries(bonusPoints)) {
    const cb = document.querySelector(`input[name="${bid}"]`);
    if (cb && cb.checked) {
      if (bid === 'bonus1' && field === 'academic') continue;
      if (bid === 'bonus2' && field !== 'management') continue;
      if (bid === 'bonus15' && field !== 'management') continue;
      total += pts;
    }
  }

  return total;
}

function recalc() {
  const total = calculateScore();
  const el = document.getElementById('totalScore');
  el.textContent = total;
  el.className = 'score-value';
  if (total >= 70) el.classList.add('pass');
  else if (total > 0) el.classList.add('fail');

  const threshEl = document.querySelector('.score-threshold');
  if (total >= 70) {
    threshEl.innerHTML = LANG[currentLang].pass + ' ✓';
    threshEl.style.color = 'var(--ok)';
  } else if (total > 0) {
    threshEl.innerHTML = `${LANG[currentLang].fail} ${70 - total} pt`;
    threshEl.style.color = 'var(--coral)';
  } else {
    threshEl.innerHTML = LANG[currentLang].threshold;
    threshEl.style.color = 'var(--silver-deep)';
  }

  updateSubtotals();
}

function getSubtotals() {
  const field = currentField;
  let eduTotal = 0, expTotal = 0, incomeTotal = 0, ageTotal = 0, researchTotal = 0, bonusTotal = 0;

  const eduVal = document.querySelector('input[name="education"]:checked')?.value;
  if (eduVal) eduTotal += SCORING[field].education[eduVal] || 0;
  if (document.querySelector('input[name="eduMulti"]')?.checked) eduTotal += 5;
  if (field === 'management' && document.querySelector('input[name="eduMBA"]')?.checked) eduTotal += 5;

  const expVal = document.querySelector('input[name="experience"]:checked')?.value;
  if (expVal) expTotal += SCORING[field].experience[expVal] || 0;

  if (selectedIncome >= 0) {
    if (field === 'management') incomeTotal += SCORING.management.income[selectedIncome] || 0;
    else if (selectedAge >= 0) incomeTotal += INCOME_POINTS[field][selectedAge][selectedIncome] || 0;
  }

  const ageVal = document.querySelector('input[name="age"]:checked')?.value;
  if (ageVal !== undefined && ageVal !== null && ageVal !== '') {
    ageTotal += SCORING[field].age[parseInt(ageVal)] || 0;
  }

  if (field === 'academic') {
    const resCount = [
      document.querySelector('input[name="resPatent"]')?.checked,
      document.querySelector('input[name="resGrant"]')?.checked,
      document.querySelector('input[name="resPaper"]')?.checked
    ].filter(Boolean).length;
    if (resCount >= 2) {
      researchTotal = 25;
    } else {
      if (document.querySelector('input[name="resPatent"]')?.checked) researchTotal += 20;
      if (document.querySelector('input[name="resGrant"]')?.checked) researchTotal += 20;
      if (document.querySelector('input[name="resPaper"]')?.checked) researchTotal += 20;
    }
  }

  const bonusPoints = {
    bonus1: field === 'academic' ? 0 : 15,
    bonus2: 10, bonus3: 5, bonus4: 10, bonus5: 5, bonus6: 5, bonus7: 10,
    bonus8: 15, bonus9: 10, bonus10: 10, bonus11: 10, bonus12: 5,
    bonus13: 10, bonus14: 10, bonus15: 5
  };
  for (const [bid, pts] of Object.entries(bonusPoints)) {
    const cb = document.querySelector(`input[name="${bid}"]`);
    if (!cb || !cb.checked) continue;
    if (bid === 'bonus1' && field === 'academic') continue;
    if (bid === 'bonus2' && field !== 'management') continue;
    if (bid === 'bonus15' && field !== 'management') continue;
    bonusTotal += pts;
  }

  return { eduTotal, expTotal, incomeTotal, ageTotal, researchTotal, bonusTotal };
}

function updateSubtotals() {
  const subs = getSubtotals();
  updateSub('sub-edu', subs.eduTotal);
  updateSub('sub-exp', subs.expTotal);
  updateSub('sub-income', subs.incomeTotal);
  updateSub('sub-age', subs.ageTotal);
  updateSub('sub-research', subs.researchTotal);
  updateSub('sub-bonus', subs.bonusTotal);
}

function updateSub(id, val) {
  const el = document.getElementById(id);
  if (!el) return;
  el.textContent = val > 0 ? `+${val}pt` : '0pt';
  el.className = val > 0 ? 'cat-subtotal has-score' : 'cat-subtotal';
}

function toggleCategory(header) {
  const body = header.nextElementSibling;
  if (!body) return;
  body.style.display = body.style.display === 'none' ? 'block' : 'none';
}

function renderAll() {

  const form = document.getElementById('calcForm');

  form.innerHTML = `

      <div class="cat-header" onclick="toggleCategory(this)">

      </div>
      <div class="cat-body">
        <p style="margin:0 0 12px; font-size:13px; color:var(--silver-deep)">${t('catExperienceDesc')}</p>
        ${buildExperienceHTML(field)}
      </div>
    </div>

    <div class="category" data-od-id="cat-age">
      <div class="cat-header" onclick="toggleCategory(this)">
        <span class="cat-title">${t('catAge')}</span>
        <span class="cat-subtotal" id="sub-age">0pt</span>
      </div>
      <div class="cat-body">
        <p style="margin:0 0 12px; font-size:13px; color:var(--silver-deep)">${t('catAgeDesc')}</p>
        ${buildAgeHTML()}
      </div>
    </div>

      <div class="cat-header" onclick="toggleCategory(this)">
        <span class="cat-title">${t('catIncome')}</span>
        <span class="cat-subtotal" id="sub-income">0pt</span>

      <div class="cat-body">

    <div class="category" data-od-id="cat-research">

        <span class="cat-title">${t('catBonus')}</span>
        <span class="cat-subtotal" id="sub-bonus">0pt</span>
      </div>
      <div class="cat-body">
        <p style="margin:0 0 12px; font-size:13px; color:var(--silver-deep)">${t('catBonusDesc')}</p>
        ${buildBonusHTML(field)}
      </div>

  recalc();

document.getElementById('langTabs').addEventListener('click', e => {
  const tab = e.target.closest('.lang-tab');
  if (!tab) return;
  setLang(tab.dataset.lang);
});

document.getElementById('fieldSelector').addEventListener('click', e => {
  const btn = e.target.closest('.field-btn');
  if (!btn) return;
  setField(btn.dataset.field);
});

renderAll();

document.getElementById('calcForm').addEventListener('change', function(e) {
  const tgt = e.target;
  if (tgt.name === 'education' || tgt.name === 'experience' || tgt.name === 'age') {
    const parent = tgt.closest('.opt-label');
    if (parent) {
      document.querySelectorAll(`input[name="${tgt.name}"]`).forEach(inp => {
        inp.closest('.opt-label')?.classList.remove('selected');
      });
      parent.classList.add('selected');
    }
  }
});

window.addEventListener('DOMContentLoaded', () => {
  const storedLang = localStorage.getItem('hsp-lang');
  if (storedLang && LANG[storedLang]) {
    currentLang = storedLang;
    document.querySelectorAll('.lang-tab').forEach(b => b.classList.toggle('active', b.dataset.lang === storedLang));
    document.querySelectorAll('[data-i18n]').forEach(el => {
      const key = el.dataset.i18n;
      if (key === 'threshold') el.innerHTML = LANG[currentLang][key];
      else el.textContent = LANG[currentLang][key];
    });
    renderAll();
  }
});

document.getElementById('langTabs').addEventListener('click', e => {
  const tab = e.target.closest('.lang-tab');
  if (!tab) return;
  localStorage.setItem('hsp-lang', tab.dataset.lang);
});
</script>
